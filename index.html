<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barista Roku — Scorekeeping</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#e8eef5;--border:#c8d6e5;
  --accent:#1e6ab4;--accent2:#2d7fd3;--accent-light:#e8f0fb;
  --danger:#d63031;--ok:#00b894;
  --text:#1a2332;--muted:#6b7c93;
  --espresso:#7c4b2a;--milk:#5a7a9a;--sig:#5b4a8a;--tech:#1e6ab4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#loginView{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e8f0fb 0%,#f0f4f8 100%);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:380px;max-width:95vw;box-shadow:0 4px 24px rgba(30,106,180,.12);}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--accent);letter-spacing:.1em;margin-bottom:.2rem;}
.login-logo span{color:var(--text);}
.login-sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem;}
.lf{margin-bottom:1rem;}
.ll{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:600;}
.li{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:7px;font-size:.95rem;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
.li:focus{outline:none;border-color:var(--accent);background:#fff;}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:.5rem;transition:background .2s;}
.login-btn:hover{background:var(--accent2);}
.login-error{color:var(--danger);font-size:.8rem;margin-top:.75rem;text-align:center;}

/* APP */
#appView{display:none;}
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(30,106,180,.08);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.1em;color:var(--accent);}
.logo span{color:var(--text);}
.header-right{display:flex;align-items:center;gap:12px;}
.user-badge{font-size:.75rem;color:var(--muted);}
.phase-tabs{display:flex;background:var(--surface2);border-radius:7px;padding:3px;border:1px solid var(--border);}
.phase-tab{padding:5px 16px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;transition:all .2s;}
.phase-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(30,106,180,.3);}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;transition:all .2s;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{color:var(--text);border-color:var(--accent);background:var(--accent-light);}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{background:var(--accent2);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid #fcc;}
.btn-danger:hover{background:#fff5f5;}
.btn-sm{padding:4px 10px;font-size:.75rem;}

.app{display:grid;grid-template-columns:270px 1fr;height:calc(100vh - 60px);}
.sidebar{background:var(--surface);border-right:2px solid var(--border);overflow-y:auto;padding:1rem 0;}
.sidebar-section{padding:.4rem 1rem .3rem;font-size:.65rem;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.ci{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;cursor:pointer;transition:background .15s;border-left:3px solid transparent;}
.ci:hover{background:var(--accent-light);}
.ci.active{background:var(--accent-light);border-left-color:var(--accent);}
.ci-name{font-size:.88rem;font-weight:600;color:var(--text);}
.ci-score{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--accent);font-weight:600;}
.ci-score.dq{color:var(--danger);}
.add-btn{margin:.6rem 1rem;width:calc(100% - 2rem);padding:8px;background:transparent;border:1.5px dashed var(--border);color:var(--muted);border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;transition:all .2s;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

.main{overflow-y:auto;padding:1.5rem 2rem;background:var(--bg);}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:1rem;}
.comp-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.05em;color:var(--text);}
.comp-sub{color:var(--muted);font-size:.82rem;margin-top:2px;}
.dq-badge{display:inline-block;background:var(--danger);color:#fff;padding:3px 10px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.1em;margin-left:10px;}
.meta-row{display:flex;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:flex-end;}
.mf{display:flex;flex-direction:column;gap:3px;}
.ml{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
.mi{background:#fff;border:1.5px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:.88rem;width:110px;transition:border-color .2s;}
.mi:focus{outline:none;border-color:var(--accent);}

/* SECTIONS */
.sections-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:.85rem;}
.fw{grid-column:1/-1;}
.ss{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(30,106,180,.06);}
.sh2{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);}
.st2{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;}
.sv{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);font-weight:600;}
.smx{font-size:.68rem;color:var(--muted);font-weight:400;}

.se .sh2{background:#fdf6f0;} .se .st2{color:var(--espresso);}
.sm2 .sh2{background:#f0f5fa;} .sm2 .st2{color:var(--milk);}
.ss2 .sh2{background:#f5f0fa;} .ss2 .st2{color:var(--sig);}
.st3 .sh2{background:#f0f5fb;} .st3 .st2{color:var(--tech);}
.sb .sh2{background:#f0f5fb;} .sb .st2{color:var(--accent);}

.scroll-wrap{overflow-x:auto;}
.jc{display:grid;gap:0;}
.jc.s4{grid-template-columns:repeat(4,minmax(130px,1fr));}
.jc.t2{grid-template-columns:repeat(2,1fr);}
.jch{padding:6px 10px;font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1.5px solid var(--border);text-align:center;background:var(--surface2);}
.jch:not(:last-child){border-right:1.5px solid var(--border);}
.sc{padding:6px 10px;border-bottom:1px solid #edf2f7;display:flex;flex-direction:column;gap:3px;}
.sc:not(:last-child){border-right:1.5px solid var(--border);}
.slbl{font-size:.63rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.smult{font-size:.6rem;color:var(--accent);font-weight:700;}
.si{background:transparent;border:none;border-bottom:1.5px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;width:100%;padding:2px 0;text-align:center;transition:border-color .2s;}
.si:focus{outline:none;border-bottom-color:var(--accent);background:var(--accent-light);}
.yn{display:flex;gap:4px;justify-content:center;padding:2px 0;}
.yb{padding:3px 9px;border-radius:4px;border:1.5px solid var(--border);font-size:.7rem;cursor:pointer;background:#fff;color:var(--muted);font-family:'DM Mono',monospace;font-weight:600;transition:all .15s;}
.yb.ya{background:#e6f9f0;border-color:var(--ok);color:#007a5a;}
.yb.na{background:#ffe8e8;border-color:var(--danger);color:var(--danger);}

/* TOTAL BAR */
.total-bar{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:.85rem;box-shadow:0 2px 8px rgba(30,106,180,.08);}
.bd{display:flex;flex-direction:column;align-items:center;gap:2px;}
.bdl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.bdv{font-family:'DM Mono',monospace;font-size:.95rem;color:var(--accent);font-weight:600;}
.tbig{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--accent);letter-spacing:.05em;line-height:1;}

/* HEAD JUDGE */
.hj{background:var(--surface);border:1.5px solid #b2dfdb;border-radius:9px;overflow:hidden;margin-top:.85rem;}
.hjh{padding:10px 14px;background:#e8f5e9;border-bottom:1.5px solid #b2dfdb;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.hjt{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#2e7d32;}
.hjn{font-size:.68rem;color:var(--muted);font-style:italic;}
.hjg{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid #e0f2f1;}
.hjc{padding:9px 12px;border-right:1px solid #e0f2f1;display:flex;flex-direction:column;gap:3px;}
.hjc:last-child{border-right:none;}
.hjcl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.hjcv{font-family:'DM Mono',monospace;font-size:1.05rem;color:var(--text);font-weight:600;}
.hjf{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;background:#f1f8e9;}
.hjfm{font-size:.78rem;color:var(--muted);}
.hjfs{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#2e7d32;letter-spacing:.05em;}

/* SCANS */
.scans-panel{background:var(--surface);border:1.5px solid #d1c4e9;border-radius:9px;overflow:hidden;margin-top:.85rem;}
.scans-head{padding:10px 14px;background:#ede7f6;border-bottom:1.5px solid #d1c4e9;display:flex;align-items:center;justify-content:space-between;}
.scans-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#5b4a8a;}
.scans-list{padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem;}
.scan-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--surface2);border-radius:6px;border:1px solid var(--border);}
.scan-label{font-size:.8rem;font-weight:600;}
.scan-meta{font-size:.68rem;color:var(--muted);}
.scan-actions{display:flex;gap:6px;}
.upload-label-select{display:flex;align-items:center;gap:8px;padding:0 1rem .75rem;}
.upload-select{background:#fff;border:1.5px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;flex:1;}

/* RANKINGS */
#rankingView{padding:1.5rem 2rem;}
.rt{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--accent);letter-spacing:.05em;margin-bottom:1.25rem;}
table.rtbl{width:100%;border-collapse:collapse;}
table.rtbl th{padding:8px 12px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:2px solid var(--border);font-weight:700;}
table.rtbl td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:.88rem;}
table.rtbl tr:hover td{background:var(--accent-light);}
.rn{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--muted);width:36px;}
.r1 .rn{color:#f9a825;} .r2 .rn{color:#90a4ae;} .r3 .rn{color:#a1887f;}
.rf{display:inline-block;background:var(--accent);color:#fff;font-size:.62rem;font-weight:700;letter-spacing:.08em;padding:2px 6px;border-radius:4px;margin-left:5px;}
.mono{font-family:'DM Mono',monospace;color:var(--accent);font-size:.95rem;font-weight:600;}
.mono.dq{color:var(--danger);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.md{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.5rem;width:400px;max-width:95vw;box-shadow:0 8px 32px rgba(30,106,180,.15);}
.md h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);margin-bottom:1rem;letter-spacing:.05em;}
.mdf{margin-bottom:.85rem;}
.mdl{font-size:.75rem;color:var(--muted);margin-bottom:4px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.mdi{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.88rem;}
.mdi:focus{outline:none;border-color:var(--accent);}
.mda{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1.25rem;font-size:.85rem;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--ok);color:#007a5a;background:#f0fdf8;}
.toast.err{border-color:var(--danger);color:var(--danger);background:#fff5f5;}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
.saving{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:4px;}

.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div id="loginView">
  <div class="login-box">
    <div class="login-logo">Barista <span>Roku</span></div>
    <div class="login-sub">Czech Barista Championship 2026 — Scorekeeping</div>
    <div class="lf"><label class="ll">Email</label><input class="li" type="email" id="loginEmail" placeholder="your@email.com"/></div>
    <div class="lf"><label class="ll">Password</label><input class="li" type="password" id="loginPass" placeholder="••••••••"/></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error hidden" id="loginError"></div>
  </div>
</div>

<div id="appView">
  <header>
    <div class="logo">Barista <span>Roku</span></div>
    <div class="phase-tabs">
      <button class="phase-tab active" onclick="setPhase('semi')">Semi-Final</button>
      <button class="phase-tab" onclick="setPhase('final')">Final</button>
      <button class="phase-tab" onclick="setPhase('ranking')">Results</button>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <div class="saving hidden" id="savingIndicator"><div class="spinner"></div>Saving...</div>
      <button class="btn btn-g" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <div id="scoreView" class="app">
    <div class="sidebar">
      <div class="sidebar-section" id="sidebarLabel">Semi-Finalists (0/18)</div>
      <div id="competitorList"></div>
      <button class="add-btn" onclick="openAddModal()">+ Add Competitor</button>
    </div>
    <div class="main" id="mainContent">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);flex-direction:column;gap:8px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--border)">SELECT COMPETITOR</div>
        <div style="font-size:.82rem">or add a new one below</div>
      </div>
    </div>
  </div>

  <div id="rankingView" class="hidden">
    <div class="rt">Results</div>
    <div id="rankingContent"></div>
  </div>
</div>

<div class="mo hidden" id="addModal">
  <div class="md">
    <h3>Add Competitor</h3>
    <div class="mdf"><label class="mdl">Name</label><input class="mdi" id="modalName" placeholder="First Last"/></div>
    <div class="mdf"><label class="mdl">Judge Team</label>
      <select class="mdi" id="modalTeam">
        <option value="1">Team 1</option><option value="2">Team 2</option><option value="3">Team 3</option>
      </select>
    </div>
    <div class="mda">
      <button class="btn btn-g" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-p" onclick="saveCompetitor()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://cggujadkrrrbeuuxitmm.supabase.co';
const SUPA_KEY='sb_publishable_ekXbKIfiSWnRcw8dcjsNCg_pH1OO5qs';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let phase='semi',competitors=[],scoresCache={},scansCache={},selectedId=null,currentUser=null,saveTimeout=null;

// ── SCORE STRUCTURE ──────────────────────────────────────────
// WBC 2025 official maxima:
// Sensory per judge: I=49, II=33, III=42, IV=30, V=24 → 178
// Technical per judge: I=6, II=17, III=22, IV=17, V=9 → 71
// CB Semi: 2 tech judges (T2=T1 mirror), 4 sensory → max 854
// Final: no tech, 4 sensory → max 712

function emptyScoreData(){
  return{
    time:'',
    t_clean_start:null,
    t_esp_flush:null,t_esp_dry:null,t_esp_waste:null,t_esp_dose:null,
    t_esp_clean_pf:null,t_esp_brew:null,t_esp_time:null,
    t_milk_flush:null,t_milk_dry:null,t_milk_waste_g:null,t_milk_dose:null,
    t_milk_clean_pf:null,t_milk_brew:null,t_milk_time:null,
    t_milk_empty:null,t_milk_purge_before:null,t_milk_clean_wand:null,
    t_milk_purge_after:null,t_milk_waste_ml:null,
    t_sig_flush:null,t_sig_dry:null,t_sig_waste:null,t_sig_dose:null,
    t_sig_clean_pf:null,t_sig_brew:null,t_sig_time:null,
    t_station:null,t_clean_pf_spouts:null,t_hygiene:null,t_cloths:null,
    sensory:[0,1,2,3].map(()=>({
      s_crema:null,
      s_esp_taste_desc:null,s_esp_tactile_desc:null,
      s_esp_taste_exp:null,s_esp_tactile_exp:null,
      s_milk_visual:null,s_milk_taste_desc:null,s_milk_taste_exp:null,
      s_sig_acc_taste:null,s_sig_well_explained:null,s_sig_taste_exp:null,
      s_attention:null,s_presentation:null,s_coffee_knowledge:null,
      s_total_impression:null,
    }))
  };
}

// ── CALCULATIONS ─────────────────────────────────────────────
// KEY FIX: use 0 for null fields when partially filled, so score
// shows running total instead of — until everything is complete.
const fv=v=>(v!==null&&v!==''&&!isNaN(parseFloat(v)))?parseFloat(v):null;
const fy=v=>(v===1?1:v===0?0:null);
const fv0=v=>(fv(v)!==null?fv(v):0);  // 0 if not yet entered
const fy0=v=>(fy(v)!==null?fy(v):0);  // 0 if not yet clicked

function sensoryScore(sj){
  // Part I — Espresso (max 49)
  const p1=(fy0(sj.s_crema))
    +(fv0(sj.s_esp_taste_desc)*4)
    +(fv0(sj.s_esp_tactile_desc)*2)
    +(fv0(sj.s_esp_taste_exp)*3)
    +(fv0(sj.s_esp_tactile_exp)*2);
  // Part II — Milk (max 33)
  const p2=(fv0(sj.s_milk_visual))
    +(fv0(sj.s_milk_taste_desc)*4)
    +(fv0(sj.s_milk_taste_exp)*3);
  // Part III — Signature (max 42)
  const p3=(fv0(sj.s_sig_acc_taste)*4)
    +(fv0(sj.s_sig_well_explained)*2)
    +(fv0(sj.s_sig_taste_exp)*3);
  // Part IV — Barista (max 30)
  const p4=(fv0(sj.s_attention)*2)
    +(fv0(sj.s_presentation)*3)
    +(fv0(sj.s_coffee_knowledge)*2);
  // Part V — Total Impression (max 24, ×4 WBC 2025)
  const p5=(fv0(sj.s_total_impression)*4);
  return{p1,p2,p3,p4,p5,tot:p1+p2+p3+p4+p5};
}

function techScore(s){
  // Part I (max 6)
  const p1=fv0(s.t_clean_start);
  // Part II Espresso (max 17): 5 Y/N + waste(0-6) + dose(0-6)
  const p2=fy0(s.t_esp_flush)+fy0(s.t_esp_dry)+fy0(s.t_esp_clean_pf)
    +fy0(s.t_esp_brew)+fy0(s.t_esp_time)+fv0(s.t_esp_waste)+fv0(s.t_esp_dose);
  // Part III Milk (max 22): 10 Y/N + waste + dose
  const p3=fy0(s.t_milk_flush)+fy0(s.t_milk_dry)+fy0(s.t_milk_clean_pf)
    +fy0(s.t_milk_brew)+fy0(s.t_milk_time)+fy0(s.t_milk_empty)
    +fy0(s.t_milk_purge_before)+fy0(s.t_milk_clean_wand)+fy0(s.t_milk_purge_after)
    +fy0(s.t_milk_waste_ml)+fv0(s.t_milk_waste_g)+fv0(s.t_milk_dose);
  // Part IV Sig (max 17): 5 Y/N + waste + dose
  const p4=fy0(s.t_sig_flush)+fy0(s.t_sig_dry)+fy0(s.t_sig_clean_pf)
    +fy0(s.t_sig_brew)+fy0(s.t_sig_time)+fv0(s.t_sig_waste)+fv0(s.t_sig_dose);
  // Part V (max 9): station(0-6) + 3 Y/N
  const p5=fv0(s.t_station)+fy0(s.t_clean_pf_spouts)+fy0(s.t_hygiene)+fy0(s.t_cloths);
  return{p1,p2,p3,p4,p5,tot:p1+p2+p3+p4+p5};
}

function timePen(t){
  if(!t)return 0;
  const[m,s]=t.split(':').map(Number);
  if(isNaN(m)||isNaN(s))return 0;
  return Math.max(0,Math.min((m*60+s)-900,60));
}
function isDQ(t){if(!t)return false;const[m,s]=t.split(':').map(Number);return!isNaN(m)&&!isNaN(s)&&(m*60+s)>960;}

function calcTotal(comp){
  const sd=getScores(comp.id),fin=comp.phase==='final';
  if(isDQ(sd.time))return{total:null,dq:true,tech:0,tc:0,ss:[0,0,0,0],st:0,pen:0};
  const pen=timePen(sd.time);
  const tr=techScore(sd);
  const ss=sd.sensory.map(sj=>sensoryScore(sj).tot);
  const stot=ss.reduce((a,b)=>a+b,0);
  const tc=fin?0:tr.tot*2;
  return{total:tc+stot-pen,dq:false,tech:tr.tot,tc,ss,st:stot,pen};
}

// ── DATA ─────────────────────────────────────────────────────
async function loadAll(){
  const[compsRes,scoresRes,scansRes]=await Promise.all([
    sb.from('competitors').select('*').order('created_at'),
    sb.from('scores').select('*'),
    sb.from('scans').select('*').order('uploaded_at'),
  ]);

// ── UPDATE ───────────────────────────────────────────────────
function upd(compId,key,value,ji){
  if(!scoresCache[compId])scoresCache[compId]=emptyScoreData();
  const sd=scoresCache[compId];
  const p=(value===''||value===null)?null:(value===0||value===1)?value:parseFloat(value);
  if(ji!==null)sd.sensory[ji][key]=(value===''||value===null)?null:p;
  else if(key==='time')sd.time=value;
  else sd[key]=p;
  schedSave(compId);
  renderSidebar();
  // Y/N button click (value is number 0 or 1) — re-render scoresheet so button states update
  if(typeof value==='number'){renderScoresheet();return;}
  // Numeric input — only update total in place to keep focus
  const comp=competitors.find(c=>c.id===compId);
  if(comp){
    const r=calcTotal(comp);
    const tb=document.querySelector('.tbig');
    if(tb)tb.textContent=r.dq?'DQ':r.total.toFixed(1);
  }
}

// ── SCANS ────────────────────────────────────────────────────
async function uploadScan(compId,input){
  const files=Array.from(input.files);if(!files.length)return;
  toast(`Uploading ${files.length} file(s)...`,'');
  let failed=0;
  for(const file of files){
    const label=file.name.replace(/\.[^.]+$/,'');
    const ext=file.name.split('.').pop();
    const path=`${compId}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
    const{error:upErr}=await sb.storage.from('scans').upload(path,file);
    if(upErr){failed++;continue;}
    await sb.from('scans').insert({competitor_id:compId,judge_label:label,file_path:path,file_name:file.name,uploaded_by:currentUser.id});
  }
  const{data}=await sb.from('scans').select('*').eq('competitor_id',compId).order('uploaded_at');
  scansCache[compId]=data||[];
  input.value='';
  toast(failed?`Done — ${failed} file(s) failed`:`${files.length} scan(s) uploaded ✓`,failed?'err':'ok');
  renderScoresheet();
}
async function downloadScan(filePath,fileName){
  const{data,error}=await sb.storage.from('scans').download(filePath);
  if(error){toast('Download failed','err');return;}
  const url=URL.createObjectURL(data);
  const a=document.createElement('a');a.href=url;a.download=fileName;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function deleteScan(scanId,filePath,compId){
  if(!confirm('Delete this scan?'))return;
  await sb.storage.from('scans').remove([filePath]);
  await sb.from('scans').delete().eq('id',scanId);
  scansCache[compId]=(scansCache[compId]||[]).filter(s=>s.id!==scanId);
  toast('Scan deleted','ok');renderScoresheet();
}

// ── RANKINGS ─────────────────────────────────────────────────
function renderRankings(){
  const el=document.getElementById('rankingContent');
  const rr=(label,ph,topN)=>{
    const comps=competitors.filter(c=>c.phase===ph);
    const sorted=comps.map(c=>({...c,r:calcTotal(c)})).sort((a,b)=>{
      if(a.r.dq&&!b.r.dq)return 1;if(!a.r.dq&&b.r.dq)return-1;
      return b.r.total-a.r.total;
    });
    return`<div style="margin-bottom:2.5rem"><h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--muted);letter-spacing:.08em;margin-bottom:1rem">${label}</h2>
    <table class="rtbl"><thead><tr><th>#</th><th>Name</th><th>Team</th><th>Tech T1+T2</th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>Penalty</th><th>Total</th></tr></thead><tbody>
    ${sorted.map((c,i)=>`<tr class="r${i+1}"><td class="rn">${i+1}</td><td><strong>${c.name}</strong>${i<topN?'<span class="rf">FINALIST</span>':''}</td><td style="color:var(--muted)">Team ${c.team}</td><td class="mono">${c.r.tc.toFixed(1)}</td><td class="mono" style="font-size:.82rem">${c.r.ss[0].toFixed(1)}</td><td class="mono" style="font-size:.82rem">${c.r.ss[1].toFixed(1)}</td><td class="mono" style="font-size:.82rem">${c.r.ss[2].toFixed(1)}</td><td class="mono" style="font-size:.82rem">${c.r.ss[3].toFixed(1)}</td><td class="mono" style="color:var(--danger)">${c.r.pen>0?'−'+c.r.pen:'0'}</td><td class="mono ${c.r.dq?'dq':''}">${c.r.dq?'DQ':c.r.total.toFixed(1)}</td></tr>`).join('')}
    </tbody></table></div>`;
  };
  el.innerHTML=rr('Semi-Final',competitors.filter(c=>c.phase==='semi').length?'semi':'semi',6)+rr('Final','final',1);
}

// ── TOAST ────────────────────────────────────────────────────
let toastT;
function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(type||'');clearTimeout(toastT);toastT=setTimeout(()=>el.className='toast',2500);}

document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mo').forEach(m=>m.classList.add('hidden'));});
document.getElementById('loginEmail').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session)await initApp(session.user);})();
</script>
